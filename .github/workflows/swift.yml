name: Swift

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: macos-latest

    steps:
    - uses: actions/checkout@v4
    - name: Select latest Xcode
      run: sudo xcode-select -s /Applications/Xcode.app
    - name: Build
      run: swift build -v
